name: Apply replay ESS gating fix

on:
  push:
    branches:
      - agent/fix-replay-proposal-ess-gating
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-replay-proposal-ess-gating

      - name: Apply fix and regression test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/pyrecest/filters/replay_grid_likelihood.py")
          source = source_path.read_text(encoding="utf-8")
          old = """    if base_probability <= 0.0:\n        return 0.0, ess_fraction\n    if base_probability >= 1.0:\n        return base_probability, ess_fraction\n    if ess_threshold is None or ess_fraction < ess_threshold:\n"""
          new = """    if base_probability <= 0.0:\n        return 0.0, ess_fraction\n    if ess_threshold is None or ess_fraction < ess_threshold:\n"""
          if source.count(old) != 1:
              raise RuntimeError("expected replay proposal gating block exactly once")
          source_path.write_text(source.replace(old, new), encoding="utf-8")

          test_path = Path("tests/filters/test_replay_grid_ess_gating.py")
          test_path.write_text(
              '''import types\nimport unittest\n\nimport numpy as np\n\nfrom pyrecest.filters import adaptive_position_proposal_probability\n\n\nclass TestReplayGridEssGating(unittest.TestCase):\n    def test_probability_one_still_respects_ess_threshold(self):\n        high_ess_filter = types.SimpleNamespace(\n            filter_state=types.SimpleNamespace(w=np.ones(4))\n        )\n        probability, ess_fraction = adaptive_position_proposal_probability(\n            high_ess_filter, 1.0, 0.5\n        )\n        self.assertEqual(probability, 0.0)\n        self.assertAlmostEqual(ess_fraction, 1.0)\n\n        low_ess_filter = types.SimpleNamespace(\n            filter_state=types.SimpleNamespace(\n                w=np.array([1.0, 0.0, 0.0, 0.0])\n            )\n        )\n        probability, ess_fraction = adaptive_position_proposal_probability(\n            low_ess_filter, 1.0, 0.5\n        )\n        self.assertEqual(probability, 1.0)\n        self.assertAlmostEqual(ess_fraction, 0.25)\n\n\nif __name__ == "__main__":\n    unittest.main()\n''',
              encoding="utf-8",
          )
          PY

      - name: Install package
        run: python -m pip install -e .

      - name: Run focused tests
        shell: bash
        run: |
          python tests/filters/test_replay_grid_ess_gating.py
          python tests/filters/test_replay_grid_likelihood.py

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pyrecest/filters/replay_grid_likelihood.py tests/filters/test_replay_grid_ess_gating.py
          git diff --cached --check
          git commit -m "Apply ESS gating to full proposal probability"
          git push origin HEAD:agent/fix-replay-proposal-ess-gating
