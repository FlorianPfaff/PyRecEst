name: One-shot sparse ROI coordinate fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/validate-sparse-roi-coordinates

      - name: Apply source and regression-test patch
        shell: bash
        run: |
          cat > /tmp/roi.patch <<'PATCH'
          --- a/src/pyrecest/utils/roi_assignment.py
          +++ b/src/pyrecest/utils/roi_assignment.py
          @@ -155,6 +155,32 @@
               return integer_value


          +def _as_sparse_coordinate_vector(values, name: str):
          +    """Return flattened sparse pixel coordinates after lossless validation."""
          +
          +    try:
          +        values_array = asarray(values).ravel()
          +    except (TypeError, ValueError, RuntimeError, OverflowError) as exc:
          +        raise ValueError(
          +            f"{name} must contain non-negative integer coordinates."
          +        ) from exc
          +
          +    raw_values = values_array.tolist()
          +    coordinates = []
          +    for value in raw_values:
          +        if isinstance(value, (bool, str, bytes, bytearray, complex)):
          +            raise ValueError(
          +                f"{name} must contain non-negative integer coordinates."
          +            )
          +        try:
          +            coordinates.append(_as_nonnegative_integer(value, name))
          +        except ValueError as exc:
          +            raise ValueError(
          +                f"{name} must contain non-negative integer coordinates."
          +            ) from exc
          +    return array(coordinates, dtype=int64)
          +
          +
           def _histogram(values, *, bins: int, value_min: float, value_max: float):
               bins = _as_positive_integer(bins, "nbins")

          @@ -189,11 +215,11 @@
                       raise KeyError(
                           "Sparse ROI mappings must provide both 'ypix' and 'xpix' keys."
                       )
          -        ypix = asarray(roi["ypix"], dtype=int64).ravel()
          -        xpix = asarray(roi["xpix"], dtype=int64).ravel()
          +        ypix = _as_sparse_coordinate_vector(roi["ypix"], "ypix")
          +        xpix = _as_sparse_coordinate_vector(roi["xpix"], "xpix")
               elif isinstance(roi, tuple) and len(roi) == 2:
          -        ypix = asarray(roi[0], dtype=int64).ravel()
          -        xpix = asarray(roi[1], dtype=int64).ravel()
          +        ypix = _as_sparse_coordinate_vector(roi[0], "ypix")
          +        xpix = _as_sparse_coordinate_vector(roi[1], "xpix")
               else:
                   mask = asarray(roi)
                   if mask.ndim != 2:
          PATCH
          git apply /tmp/roi.patch

          cat > tests/test_roi_assignment_sparse_coordinate_validation.py <<'PY'
          import pytest

          from pyrecest.utils.roi_assignment import roi_iou


          @pytest.mark.parametrize(
              ("roi", "coordinate_name"),
              [
                  ({"ypix": [1.5], "xpix": [0]}, "ypix"),
                  ({"ypix": [-1], "xpix": [0]}, "ypix"),
                  ({"ypix": [0], "xpix": [float("nan")]}, "xpix"),
                  (([0], [float("inf")]), "xpix"),
                  (([True], [0]), "ypix"),
              ],
          )
          def test_sparse_roi_rejects_lossy_or_invalid_coordinates(roi, coordinate_name):
              valid_roi = {"ypix": [0], "xpix": [0]}

              with pytest.raises(ValueError, match=coordinate_name):
                  roi_iou(roi, valid_roi)


          def test_sparse_roi_accepts_nonnegative_integer_valued_floats():
              sparse_mapping = {"ypix": [0.0, 1.0], "xpix": [2.0, 3.0]}
              sparse_tuple = ([0, 1], [2, 3])

              assert roi_iou(sparse_mapping, sparse_tuple) == 1.0
          PY

      - name: Validate patch structure
        shell: bash
        run: |
          python -m py_compile src/pyrecest/utils/roi_assignment.py tests/test_roi_assignment_sparse_coordinate_validation.py
          git diff --check

      - name: Commit focused fix
        shell: bash
        run: |
          rm .github/workflows/one-shot-sparse-roi-coordinate-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pyrecest/utils/roi_assignment.py tests/test_roi_assignment_sparse_coordinate_validation.py .github/workflows/one-shot-sparse-roi-coordinate-fix.yml
          git commit -m "Validate sparse ROI coordinates"
          git push origin HEAD:agent/validate-sparse-roi-coordinates
