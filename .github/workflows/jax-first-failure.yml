name: Temporary sharded backend diagnosis

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  sharded-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [jax, pytorch]
        shard: [0, 1, 2, 3]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system build dependencies
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry env use python
          if [ "${{ matrix.backend }}" = "jax" ]; then
            extra="jax_support"
          else
            extra="pytorch_support"
          fi
          poetry install --with dev --extras "healpy_support ${extra}"

      - name: Run backend test shard
        run: |
          if [ "${{ matrix.backend }}" = "jax" ]; then
            export JAX_ENABLE_X64=True
          fi
          export PYRECEST_BACKEND="${{ matrix.backend }}"
          mapfile -t files < <(
            find tests -type f -name 'test_*.py' -print \
              | sort \
              | awk -v shard="${{ matrix.shard }}" '((NR - 1) % 4) == shard'
          )
          prefix="${{ matrix.backend }}-shard-${{ matrix.shard }}"
          printf '%s\n' "${files[@]}" > "${prefix}-files.txt"
          set +e
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --maxfail=1 \
            --tb=long \
            "${files[@]}" > "${prefix}-full.log" 2>&1
          status=$?
          tail -n 320 "${prefix}-full.log" > "${prefix}-first-failure.log"
          printf '%s\n' "$status" > "${prefix}-exit-code.txt"
          exit 0

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.backend }}-shard-${{ matrix.shard }}
          path: |
            ${{ matrix.backend }}-shard-${{ matrix.shard }}-files.txt
            ${{ matrix.backend }}-shard-${{ matrix.shard }}-first-failure.log
            ${{ matrix.backend }}-shard-${{ matrix.shard }}-exit-code.txt
